<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дом — загород посуточно</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap&subset=cyrillic,latin" rel="stylesheet">
<style>
:root{
  --ink:#0C1D16;--pine:#123329;--pine-2:#1C4B3A;--cream:#F5F0E4;--birch:#EBE3D2;
  --honey:#E7A64C;--amber:#C9772E;--clay:#A8481F;--text:#25332C;--muted:#6B7A70;
  --on-dark:#ECE4D3;--on-dark-mut:rgba(236,228,211,.66);--line:rgba(37,51,44,.14);
  --shadow:0 30px 70px -30px rgba(12,29,22,.5);--radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3{font-family:'Cormorant',Georgia,serif;font-weight:500;line-height:1.04}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--honey);color:var(--ink)}
.wrap{width:min(1080px,92vw);margin-inline:auto}
.eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;font-weight:600;color:var(--honey)}

/* nav */
.nav{background:var(--ink);color:var(--on-dark);position:sticky;top:0;z-index:20}
.nav .wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:20px}
.brand{display:flex;align-items:center;gap:12px;font-family:'Cormorant',serif;font-size:1.4rem}
.brand .mk{width:30px;height:30px;flex:none}
.nav-cta{background:var(--honey);color:var(--ink);padding:11px 22px;border-radius:100px;font-weight:700;font-size:.85rem;transition:.35s}
.nav-cta:hover{background:var(--on-dark)}

/* hero */
.d-hero{position:relative;background:var(--pine);color:var(--on-dark);overflow:hidden}
.d-hero .scene{position:absolute;inset:0;opacity:.45}
.d-hero .scene svg{width:100%;height:100%;object-fit:cover}
.d-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,29,22,.2),rgba(12,29,22,.55))}
.d-hero .wrap{position:relative;z-index:2;padding:60px 0 50px}
.back{display:inline-block;color:var(--on-dark-mut);font-size:.88rem;font-weight:600;margin-bottom:18px;transition:color .3s}
.back:hover{color:var(--honey)}
.d-hero h1{font-size:clamp(2.4rem,6vw,4.2rem);margin:.12em 0 .18em}
.d-hero .loc{color:var(--on-dark-mut);font-size:1.02rem}
.d-hero .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.chip{background:rgba(236,228,211,.14);color:var(--on-dark);padding:8px 15px;border-radius:100px;font-size:.84rem;font-weight:600;backdrop-filter:blur(4px)}

/* body layout */
.d-body{padding:56px 0 30px}
.cols{display:grid;grid-template-columns:1fr 340px;gap:44px;align-items:start}
.block{margin-bottom:44px}
.block:last-child{margin-bottom:0}
.section-t{font-size:1.9rem;margin-bottom:8px}
.section-sub{color:var(--muted);margin-bottom:20px;font-size:1.02rem}
.prose p{margin-bottom:14px;color:var(--text);font-size:1.06rem}
.lead{font-family:'Cormorant',serif;font-size:1.5rem;line-height:1.35;color:var(--pine);margin-bottom:22px}

/* facts grid */
.facts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.fact{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.fact .k{font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
.fact .v{font-size:1.02rem;font-weight:600;color:var(--text);margin-top:3px}

/* amenities */
.amen-group{margin-bottom:20px}
.amen-group h4{font-family:'Manrope';font-size:.76rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:12px}
.pills{display:flex;flex-wrap:wrap;gap:9px}
.pill{background:var(--birch);color:var(--text);padding:8px 14px;border-radius:100px;font-size:.88rem;font-weight:500}

/* rules */
.rule-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.rule-card{background:var(--pine);color:var(--on-dark);border-radius:16px;padding:18px 16px;text-align:center}
.rule-card .rl{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dark-mut);font-weight:600}
.rule-card .rv{font-family:'Cormorant',serif;font-size:2rem;margin-top:4px;color:var(--honey)}
.rules-list{list-style:none;display:grid;gap:10px}
.rules-list li{position:relative;padding-left:28px;color:var(--text);font-size:1rem}
.rules-list li::before{content:"";position:absolute;left:0;top:.55em;width:12px;height:12px;border-radius:50%;background:var(--honey);box-shadow:0 0 0 4px rgba(231,166,76,.2)}

/* aside */
.aside{position:sticky;top:88px;background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
.aside .price{font-family:'Cormorant',serif;font-size:2.6rem;color:var(--pine);line-height:1}
.aside .price .from{font-family:'Manrope';font-size:.9rem;font-weight:600;color:var(--muted);display:block;margin-bottom:2px}
.aside .price small{font-family:'Manrope';font-size:.9rem;font-weight:500;color:var(--muted)}
.aside .cap{margin:12px 0 20px;color:var(--muted);font-size:.94rem}
.aside .big-btn{display:block;width:100%;text-align:center;background:var(--pine);color:var(--on-dark);padding:16px;border-radius:14px;font-weight:700;font-size:1rem;transition:.35s}
.aside .big-btn:hover{background:var(--amber);color:var(--ink)}
.aside .avito{display:block;text-align:center;margin-top:14px;font-size:.84rem;color:var(--muted);font-weight:600;transition:color .3s}
.aside .avito:hover{color:var(--amber)}
.aside .addr{margin-top:20px;padding-top:18px;border-top:1px solid var(--line);font-size:.86rem;color:var(--muted)}
.aside .addr b{display:block;color:var(--text);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700}

footer{background:var(--ink);color:var(--on-dark-mut);padding:40px 0;font-size:.86rem;text-align:center;margin-top:40px}
.notfound{padding:100px 0;text-align:center}
.notfound h1{font-size:2.6rem;margin-bottom:14px}
.notfound a{color:var(--amber);font-weight:700}

@media(max-width:820px){
  .cols{grid-template-columns:1fr;gap:8px}
  .aside{position:static;margin-bottom:36px;order:-1}
  .facts{grid-template-columns:repeat(2,1fr)}
  .d-body{padding:40px 0 20px}
}
@media(max-width:520px){
  .rule-cards{grid-template-columns:1fr}
  .facts{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a class="brand" href="/"><svg class="mk" viewBox="0 0 40 40" fill="none"><path d="M20 4 L34 16 V34 H24 V24 H16 V34 H6 V16 Z" stroke="#E7A64C" stroke-width="2.2" stroke-linejoin="round"/><rect x="17" y="12" width="6" height="6" fill="#E7A64C"/></svg>Загород</a>
    <a class="nav-cta" id="navBook" href="/#houses">Забронировать</a>
  </div>
</nav>

<main id="app"></main>

<footer>© 2026 · Аренда загородных домов посуточно</footer>

<script src="/scene.js"></script>
<script src="/houses-data.js"></script>
<script>
"use strict";
const fmt = n => n.toLocaleString('ru-RU');
const id = new URLSearchParams(location.search).get('id');
const houses = window.__HOUSES__ || [];
const h = houses.find(x => x.id === id);
const app = document.getElementById('app');
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

if(!h){
  app.innerHTML = `<div class="wrap notfound"><h1>Дом не найден</h1><p>Возможно, объявление снято. <a href="/#houses">Вернуться к каталогу →</a></p></div>`;
} else {
  document.title = `${h.name} — загород посуточно`;
  const isRemont = h.status === 'renovation';

  // чипы в шапке
  const meta = [];
  if(h.rooms) meta.push(`${h.rooms} комнаты`);
  if(h.area) meta.push(`${h.area} м²`);
  if(h.cap) meta.push(`до ${h.cap} гостей`);
  if(!isRemont) meta.push('Бассейн');

  // описание
  const descHtml = (h.description || []).map(p => `<p>${esc(p)}</p>`).join('');

  // характеристики
  const factsHtml = (h.facts && h.facts.length)
    ? `<div class="block"><h2 class="section-t">Характеристики</h2>
        <div class="facts">${h.facts.map(f=>`<div class="fact"><div class="k">${esc(f.k)}</div><div class="v">${esc(f.v)}</div></div>`).join('')}</div></div>`
    : '';

  // удобства
  const amenHtml = (h.amenities && h.amenities.length)
    ? `<div class="block"><h2 class="section-t">Удобства</h2><div class="section-sub">Всё для комфортного отдыха</div>
        ${h.amenities.map(g=>`<div class="amen-group"><h4>${esc(g.group)}</h4><div class="pills">${g.items.map(i=>`<span class="pill">${esc(i)}</span>`).join('')}</div></div>`).join('')}
      </div>`
    : '';

  // правила
  let rulesHtml = '';
  if(h.rules){
    const r = h.rules;
    rulesHtml = `<div class="block"><h2 class="section-t">Правила и условия</h2>
      <div class="rule-cards">
        <div class="rule-card"><div class="rl">Заезд</div><div class="rv">${esc(r.checkIn)}</div></div>
        <div class="rule-card"><div class="rl">Выезд</div><div class="rv">${esc(r.checkOut)}</div></div>
        <div class="rule-card"><div class="rl">Залог</div><div class="rv">${fmt(r.deposit)} ₽</div></div>
      </div>
      <ul class="rules-list">${(r.items||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
    </div>`;
  }

  // сайдбар
  const aside = isRemont
    ? `<div class="aside">
         <div class="price"><span class="from">Дом временно закрыт</span>На ремонте</div>
         <div class="cap">Готовим этот домик к новому сезону.</div>
         <a class="big-btn" href="/#houses">Смотреть другие дома</a>
         ${h.address ? `<div class="addr"><b>Расположение</b>${esc(h.address)}</div>` : ''}
       </div>`
    : `<div class="aside">
         <div class="price">${h.priceFrom?'<span class="from">от</span>':''}${fmt(h.price)} ₽ <small>/ сутки</small></div>
         <div class="cap">${h.cap ? 'До '+h.cap+' гостей' : ''}</div>
         <a class="big-btn" href="/?book=${encodeURIComponent(h.id)}">Забронировать</a>
         ${h.avito ? `<a class="avito" href="${esc(h.avito)}" target="_blank" rel="noopener">Смотреть на Авито ↗</a>` : ''}
         ${h.address ? `<div class="addr"><b>Расположение</b>${esc(h.address)}</div>` : ''}
       </div>`;

  app.innerHTML = `
    <header class="d-hero">
      <div class="scene">${window.scene(h.type)}</div>
      <div class="wrap">
        <a class="back" href="/#houses">← Все дома</a>
        <span class="eyebrow">${isRemont ? 'Скоро открытие' : 'Аренда посуточно · Сочи'}</span>
        <h1>${esc(h.name)}</h1>
        <div class="loc">${esc(h.loc)}</div>
        <div class="meta">${meta.map(m=>`<span class="chip">${esc(m)}</span>`).join('')}</div>
      </div>
    </header>
    <section class="d-body">
      <div class="wrap cols">
        <div>
          <div class="block">
            <h2 class="section-t">Об этом доме</h2>
            ${h.short ? `<div class="lead">${esc(h.short)}</div>` : ''}
            <div class="prose">${descHtml}</div>
          </div>
          ${factsHtml}
          ${amenHtml}
          ${rulesHtml}
        </div>
        ${aside}
      </div>
    </section>`;

  const navBook = document.getElementById('navBook');
  if(isRemont){ navBook.textContent='К каталогу'; navBook.href='/#houses'; }
  else { navBook.href = `/?book=${encodeURIComponent(h.id)}`; }
}
</script>
</body>
</html>
