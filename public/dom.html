<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дом — загород посуточно</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap&subset=cyrillic,latin" rel="stylesheet">
<style>
:root{
  --ink:#0C1D16;--pine:#123329;--pine-2:#1C4B3A;--cream:#F5F0E4;--birch:#EBE3D2;
  --honey:#E7A64C;--amber:#C9772E;--clay:#A8481F;--text:#25332C;--muted:#6B7A70;
  --on-dark:#ECE4D3;--on-dark-mut:rgba(236,228,211,.66);--line:rgba(37,51,44,.14);
  --shadow:0 30px 70px -30px rgba(12,29,22,.5);--radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3{font-family:'Cormorant',Georgia,serif;font-weight:500;line-height:1.04}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--honey);color:var(--ink)}
.wrap{width:min(1080px,92vw);margin-inline:auto}
.eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;font-weight:600;color:var(--amber)}

/* nav */
.nav{background:var(--ink);color:var(--on-dark)}
.nav .wrap{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:20px}
.brand{display:flex;align-items:center;gap:12px;font-family:'Cormorant',serif;font-size:1.4rem}
.brand .mk{width:30px;height:30px;flex:none}
.nav-cta{background:var(--honey);color:var(--ink);padding:11px 22px;border-radius:100px;font-weight:700;font-size:.85rem;transition:.35s}
.nav-cta:hover{background:var(--on-dark)}

/* hero */
.d-hero{position:relative;background:var(--pine);color:var(--on-dark);overflow:hidden}
.d-hero .scene{position:absolute;inset:0;opacity:.5}
.d-hero .scene svg{width:100%;height:100%;object-fit:cover}
.d-hero .wrap{position:relative;z-index:2;padding:64px 0 54px}
.back{display:inline-block;color:var(--on-dark-mut);font-size:.88rem;font-weight:600;margin-bottom:20px;transition:color .3s}
.back:hover{color:var(--honey)}
.d-hero h1{font-size:clamp(2.4rem,6vw,4.2rem);margin:.15em 0 .2em}
.d-hero .loc{color:var(--on-dark-mut);font-size:1.02rem}
.d-hero .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.chip{background:rgba(236,228,211,.14);color:var(--on-dark);padding:8px 15px;border-radius:100px;font-size:.84rem;font-weight:600}

/* body */
.d-body{padding:60px 0 40px}
.cols{display:grid;grid-template-columns:1fr 340px;gap:40px;align-items:start}
.section-t{font-size:1.9rem;margin-bottom:16px}
.prose p{margin-bottom:14px;color:var(--text);font-size:1.04rem}
.prose{margin-bottom:44px}
.cond{list-style:none;display:grid;gap:12px;margin-bottom:20px}
.cond li{position:relative;padding-left:30px;color:var(--text);font-size:1.02rem}
.cond li::before{content:"";position:absolute;left:0;top:.5em;width:14px;height:14px;border-radius:50%;
  background:var(--honey);box-shadow:0 0 0 4px rgba(231,166,76,.2)}

/* booking aside */
.aside{position:sticky;top:24px;background:#fff;border-radius:var(--radius);padding:26px;box-shadow:var(--shadow)}
.aside .price{font-family:'Cormorant',serif;font-size:2.6rem;color:var(--pine);line-height:1}
.aside .price small{font-family:'Manrope';font-size:.9rem;font-weight:500;color:var(--muted)}
.aside .cap{margin:10px 0 20px;color:var(--muted);font-size:.94rem}
.aside .big-btn{display:block;width:100%;text-align:center;background:var(--pine);color:var(--on-dark);
  padding:16px;border-radius:14px;font-weight:700;font-size:1rem;transition:.35s}
.aside .big-btn:hover{background:var(--amber);color:var(--ink)}
.aside .avito{display:block;text-align:center;margin-top:14px;font-size:.84rem;color:var(--muted);font-weight:600;transition:color .3s}
.aside .avito:hover{color:var(--amber)}

/* footer */
footer{background:var(--ink);color:var(--on-dark-mut);padding:40px 0;font-size:.86rem;text-align:center;margin-top:40px}

.notfound{padding:100px 0;text-align:center}
.notfound h1{font-size:2.6rem;margin-bottom:14px}
.notfound a{color:var(--amber);font-weight:700}

@media(max-width:820px){
  .cols{grid-template-columns:1fr;gap:28px}
  .aside{position:static}
  .d-body{padding:44px 0 30px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a class="brand" href="/"><svg class="mk" viewBox="0 0 40 40" fill="none"><path d="M20 4 L34 16 V34 H24 V24 H16 V34 H6 V16 Z" stroke="#E7A64C" stroke-width="2.2" stroke-linejoin="round"/><rect x="17" y="12" width="6" height="6" fill="#E7A64C"/></svg>Загород</a>
    <a class="nav-cta" id="navBook" href="/#houses">Забронировать</a>
  </div>
</nav>

<main id="app"></main>

<footer>© 2026 · Аренда загородных домов посуточно</footer>

<script src="/scene.js"></script>
<script src="/houses-data.js"></script>
<script>
"use strict";
const fmt = n => n.toLocaleString('ru-RU');
const id = new URLSearchParams(location.search).get('id');
const houses = window.__HOUSES__ || [];
const h = houses.find(x => x.id === id);
const app = document.getElementById('app');

function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

if(!h){
  app.innerHTML = `<div class="wrap notfound"><h1>Дом не найден</h1><p>Возможно, объявление снято. <a href="/#houses">Вернуться к каталогу →</a></p></div>`;
} else {
  document.title = `${h.name} — загород посуточно`;
  const isRemont = h.status === 'renovation';

  const meta = [];
  if(h.rooms) meta.push(`${h.rooms} комнаты`);
  if(h.area) meta.push(`${h.area} м²`);
  if(h.cap) meta.push(`до ${h.cap} гостей`);

  const descHtml = (h.description || []).map(p => `<p>${esc(p)}</p>`).join('');
  const condHtml = (h.conditions || []).length
    ? `<h2 class="section-t">Условия аренды</h2><ul class="cond">${h.conditions.map(c=>`<li>${esc(c)}</li>`).join('')}</ul>`
    : '';

  const aside = isRemont
    ? `<div class="aside">
         <div class="price">На ремонте</div>
         <div class="cap">Дом временно недоступен для брони — готовим его к новому сезону.</div>
         <a class="big-btn" href="/#houses">Смотреть другие дома</a>
       </div>`
    : `<div class="aside">
         <div class="price">${fmt(h.price)} ₽ <small>/ сутки</small></div>
         <div class="cap">${h.cap ? 'До '+h.cap+' гостей' : ''}</div>
         <a class="big-btn" href="/?book=${encodeURIComponent(h.id)}">Забронировать</a>
         ${h.avito ? `<a class="avito" href="${esc(h.avito)}" target="_blank" rel="noopener">Объявление на Авито ↗</a>` : ''}
       </div>`;

  app.innerHTML = `
    <header class="d-hero">
      <div class="scene">${window.scene(h.type)}</div>
      <div class="wrap">
        <a class="back" href="/#houses">← Все дома</a>
        <span class="eyebrow">${isRemont ? 'Скоро открытие' : 'Аренда посуточно'}</span>
        <h1>${esc(h.name)}</h1>
        <div class="loc">${esc(h.loc)}</div>
        <div class="meta">${meta.map(m=>`<span class="chip">${esc(m)}</span>`).join('')}</div>
      </div>
    </header>
    <section class="d-body">
      <div class="wrap cols">
        <div>
          <h2 class="section-t">Описание</h2>
          <div class="prose">${descHtml}</div>
          ${condHtml}
        </div>
        ${aside}
      </div>
    </section>`;

  // Кнопка в шапке ведёт на бронь этого дома (если он доступен)
  const navBook = document.getElementById('navBook');
  if(isRemont){ navBook.textContent='К каталогу'; navBook.href='/#houses'; }
  else { navBook.href = `/?book=${encodeURIComponent(h.id)}`; }
}
</script>
</body>
</html>
